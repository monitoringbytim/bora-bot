name: BORA Monitor

on:
  schedule:
    - cron: '*/10 * * * *'  # 10분마다 실행 (GitHub 무료 정책상 5~10분이 최소 단위입니다)
  workflow_dispatch: # 수동으로 실행해볼 때 사용

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃 코드
        uses: actions/checkout@v3
      - name: 파이썬 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: 필요 라이브러리 설치
        run: pip install requests
      - name: 봇 실행
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py
